name: CI/CD Pipeline with Security

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: List files
        run: ls -la
      
      - name: Validate HTML
        run: |
          if grep -q "<html" *.html 2>/dev/null; then
            echo "✅ HTML-filer hittades"
          else
            echo "⚠️ Inga HTML-filer hittades i roten"
          fi
      
      # SAST - Static Application Security Testing
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: javascript  # För HTML/CSS/JS-projekt
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
