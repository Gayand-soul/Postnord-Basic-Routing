name: CI/CD Pipeline with Security

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: List files
        run: ls -la
      
      - name: Validate HTML
        run: |
          if grep -q "<html" *.html 2>/dev/null; then
            echo "✅ HTML-filer hittades"
          else
            echo "⚠️ Inga HTML-filer hittades i roten"
          fi
      
      - name: Simple HTML Validation
        run: |
          echo "Validerar HTML-struktur..."
          if grep -q "<body" index.html; then
            echo "✅ <body> tag hittades"
          else
            echo "⚠️ Ingen <body> tag hittades"
          fi
          if grep -q "<html" index.html; then
            echo "✅ <html> tag hittades"
          else
            echo "⚠️ Ingen <html> tag hittades"
          fi
          echo "Filstorlek: $(wc -c < index.html) bytes"
          echo "Första 100 tecken:"
          head -c 100 index.html
        continue-on-error: true
      
      - name: Simple HTTP Server Test
        run: npm install -g http-server && http-server . -p 8080 & sleep 5 && curl -v http://localhost:8080/index.html && kill $! || true
        continue-on-error: true
      
      - name: Run SCA with Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Navbar Project'
          path: '.'
          format: 'HTML'
        continue-on-error: true
      
      - name: Custom Security Scan
        run: |
          echo "🔍 Söker efter potentiella säkerhetsrisker..."
          echo "=== Inline JavaScript (onclick, onload, etc.) ==="
          grep -r -i "onload=" --include="*.html" . || echo "Inga inline event handlers hittades"
          grep -r -i "onclick=" --include="*.html" . || echo "✓ Inga onclick hittades"
          echo "=== Externa skript ==="
          grep -r "<script" --include="*.html" . | grep "src=" || echo "Inga externa skript hittades"
          echo "=== Osäkra http-länkar ==="
          grep -r "http://" --include="*.html" . || echo "✓ Inga osäkra http-länkar hittades"
