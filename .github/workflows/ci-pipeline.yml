name: CI/CD Pipeline with Security

on:
  push:
    branches: [ master ]  # Ändra till master om du använder master
  pull_request:
    branches: [ master ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: List files (verifiera att koden finns)
        run: ls -la
      
      - name: Setup web server for testing
        run: |
          echo "Webbplatsen innehåller:" 
          find . -name "*.html" | wc -l
      
      - name: Validate HTML (grundläggande kontroll)
        run: |
          if grep -q "<html" *.html 2>/dev/null; then
            echo "✅ HTML-filer hittades"
          else
            echo "⚠️ Inga HTML-filer hittades i roten"
          fi
