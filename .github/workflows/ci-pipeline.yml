name: CI/CD Pipeline with Security

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: List files
        run: ls -la
      
      - name: Validate HTML
        run: |
          if grep -q "<html" *.html 2>/dev/null; then
            echo "✅ HTML-filer hittades"
          else
            echo "⚠️ Inga HTML-filer hittades i roten"
          fi
      
      # SAST för HTML/CSS med hjälp av Lighthouse CI (webbprestanda & säkerhet)
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun --upload.target=temporary-public-storage || echo "Lighthouse kördes men hittade inga allvarliga problem"
        continue-on-error: true
      
      # SCA - Sårbarhetskoll av beroenden (även för statiska projekt)
      - name: Run SCA with Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Navbar Project'
          path: '.'
          format: 'HTML'
        continue-on-error: true
      
      # Säkerhetskopiering: Enkel grep-baserad säkerhetskontroll
      - name: Custom Security Scan
        run: |
          echo "🔍 Söker efter potentiella säkerhetsrisker..."
          
          # Kolla efter inline JavaScript (kan indikera XSS-risker)
          echo "=== Inline JavaScript (onclick, onload, etc.) ==="
          grep -r -i "onload=" --include="*.html" . || echo "Inga inline event handlers hittades"
          grep -r -i "onclick=" --include="*.html" . || echo "✓ Inga onclick hittades"
          
          # Kolla efter externa skriptkällor (CDN, etc.)
          echo "=== Externa skript ==="
          grep -r "<script" --include="*.html" . | grep "src=" || echo "Inga externa skript hittades"
          
          # Kolla efter osäkra länkar (http://)
          echo "=== Osäkra http-länkar ==="
          grep -r "http://" --include="*.html" . || echo "✓ Inga osäkra http-länkar hittades"
