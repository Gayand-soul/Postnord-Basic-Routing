name: CI/CD Pipeline with Security

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: List files
        run: ls -la
      
      - name: Validate HTML
        run: |
          if grep -q "<html" *.html 2>/dev/null; then
            echo "✅ HTML-filer hittades"
          else
            echo "⚠️ Inga HTML-filer hittades i roten"
          fi
      
      # Lighthouse CI med korrekt konfiguration
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun  # Nu kommer den att läsa lighthouserc.js automatiskt!
        continue-on-error: true
      
      # SCA - Sårbarhetskoll av beroenden
      - name: Run SCA with Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Navbar Project'
          path: '.'
          format: 'HTML'
        continue-on-error: true
      
      # Custom Security Scan
      - name: Custom Security Scan
        run: |
          echo "🔍 Söker efter potentiella säkerhetsrisker..."
          echo "=== Inline JavaScript (onclick, onload, etc.) ==="
          grep -r -i "onload=" --include="*.html" . || echo "Inga inline event handlers hittades"
          grep -r -i "onclick=" --include="*.html" . || echo "✓ Inga onclick hittades"
          echo "=== Externa skript ==="
          grep -r "<script" --include="*.html" . | grep "src=" || echo "Inga externa skript hittades"
          echo "=== Osäkra http-länkar ==="
          grep -r "http://" --include="*.html" . || echo "✓ Inga osäkra http-länkar hittades"
